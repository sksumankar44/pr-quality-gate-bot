# Render.com Blueprint — one-click deploy of the webhook server.
# In Render: New + -> Blueprint -> point at this repo. Then set the secret
# env vars (API keys/tokens) in the dashboard; they are marked sync:false below.
services:
  - type: web
    name: pr-quality-gate-bot
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: AI_PROVIDER
        value: gemini
      - key: GITHUB_ENABLED
        value: true
      - key: GITLAB_ENABLED
        value: false
      - key: JIRA_ENABLED
        value: false
      - key: NOTIFY_PROVIDER
        value: none
      # --- secrets: set these in the Render dashboard (sync:false hides them) ---
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITLAB_TOKEN
        sync: false
      - key: GITLAB_WEBHOOK_SECRET
        sync: false
      - key: JIRA_BASE_URL
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: TEAMS_WEBHOOK_URL
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
